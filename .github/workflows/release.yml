on:
    release: 
        types: [published]

permissions: 
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions: 
            id-token: write

        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Build package
              run: uv build

            - name: Publish
              run: uv publish
